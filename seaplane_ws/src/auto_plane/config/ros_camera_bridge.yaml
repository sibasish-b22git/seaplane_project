---
# 1. RGB Color Image
- ros_topic_name: "/camera/color/image_raw"
  gz_topic_name: "/world/runway/model/cessna_aircraft/link/base_link/sensor/front_depth_camera/image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS

# 2. Camera Info (Required for Rviz/Computer Vision algorithms to interpret the lens)
- ros_topic_name: "/camera/color/camera_info"
  gz_topic_name: "/world/runway/model/cessna_aircraft/link/base_link/sensor/front_depth_camera/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "gz.msgs.CameraInfo"
  direction: GZ_TO_ROS

# 3. Depth Image (Raw distance map)
- ros_topic_name: "/camera/depth/image_raw"
  gz_topic_name: "/world/runway/model/cessna_aircraft/link/base_link/sensor/front_depth_camera/depth_image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS

# 4. 3D Point Cloud (Gazebo automatically generates this from the RGBD sensor)
- ros_topic_name: "/camera/depth/points"
  gz_topic_name: "/world/runway/model/cessna_aircraft/link/base_link/sensor/front_depth_camera/points"
  ros_type_name: "sensor_msgs/msg/PointCloud2"
  gz_type_name: "gz.msgs.PointCloudPacked"
  direction: GZ_TO_ROS
